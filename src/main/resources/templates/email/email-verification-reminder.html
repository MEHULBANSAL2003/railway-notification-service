<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Verify your email</title>
</head>
<body style="margin:0;padding:0;background-color:#f4f4f5;font-family:Arial,sans-serif;">

<table width="100%" cellpadding="0" cellspacing="0">
  <tr>
    <td align="center" style="padding:40px 0;">
      <table width="600" cellpadding="0" cellspacing="0"
             style="background:#ffffff;border-radius:8px;
                          box-shadow:0 2px 8px rgba(0,0,0,0.08);">

        <!-- Header -->
        <tr>
          <td style="background:#1a56db;padding:32px;text-align:center;
                               border-radius:8px 8px 0 0;">
            <h1 style="margin:0;color:#ffffff;font-size:24px;">
              🚂 <span th:text="${appName}">RailTick</span>
            </h1>
          </td>
        </tr>

        <!-- Body -->
        <tr>
          <td style="padding:40px 32px;">
            <p style="margin:0 0 16px;font-size:16px;color:#111827;">
              Hi <span th:text="${recipientName}">User</span>,
            </p>
            <p style="margin:0 0 24px;font-size:15px;
                                  color:#374151;line-height:1.6;">
              Your email address is not yet verified.
              Please verify it to ensure you receive important
              updates about your train bookings.
            </p>

            <!-- Verify button -->
            <table cellpadding="0" cellspacing="0" style="margin:0 0 32px;">
              <tr>
                <td style="background:#1a56db;border-radius:6px;">
                  <a th:href="${actionUrl}"
                     style="display:inline-block;padding:14px 32px;
                                              color:#ffffff;text-decoration:none;
                                              font-size:15px;font-weight:bold;">
                    Verify My Email
                  </a>
                </td>
              </tr>
            </table>

            <p style="margin:0;font-size:13px;color:#6b7280;">
              If you didn't create a RailTick account,
              you can safely ignore this email.
            </p>
          </td>
        </tr>

        <!-- Footer -->
        <tr>
          <td style="background:#f9fafb;padding:24px 32px;
                               border-top:1px solid #e5e7eb;
                               border-radius:0 0 8px 8px;">
            <p style="margin:0;font-size:12px;
                                  color:#9ca3af;text-align:center;">
              Need help?
              <a th:href="'mailto:' + ${supportEmail}"
                 th:text="${supportEmail}"
                 style="color:#1a56db;">
              </a>
            </p>
            <p style="margin:8px 0 0;font-size:12px;
                                  color:#9ca3af;text-align:center;">
              © <span th:text="${currentYear}">2026</span>
              <span th:text="${appName}">RailTick</span>.
              All rights reserved.
            </p>
          </td>
        </tr>

      </table>
    </td>
  </tr>
</table>
</body>
</html>
